<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Level Scroll Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:320vh;
  position:relative;
  padding:60px;
}

/* PARALLAX */
.layer{
  position:absolute;
  inset:0;
}
.bg1{background:#0a0a0a;z-index:-3}
.bg2{
  background:radial-gradient(circle at 30% 30%, #1a1a1a, transparent);
  z-index:-2;
}
.bg3{
  background:radial-gradient(circle at 70% 70%, #2a2a2a, transparent);
  z-index:-1;
}

/* HEADLINE */
.headline{
  display:flex;
  gap:10px;
  font-size:4rem;
  letter-spacing:12px;
}
.headline span{
  opacity:0;
  transform:translateY(80px);
  filter:blur(15px);
}

/* STATS */
.stats{
  display:flex;
  gap:20px;
  margin-top:40px;
}
.stat{
  padding:20px 30px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  opacity:0;
  transform:translateY(40px);
}

/* CAR */
.car-wrapper{
  position:sticky;
  top:45%;
}

/* SVG CAR */
.car-svg{
  width:260px;
  transform:translateX(-150%) scale(0.7);
}

/* WHEELS */
.wheel{
  transform-origin:center;
}

/* ROAD */
.road{
  position:absolute;
  bottom:18%;
  width:100%;
  height:6px;
  background:repeating-linear-gradient(
    90deg,
    white 0 25px,
    transparent 25px 50px
  );
  opacity:0.3;
}

.spacer{height:100vh}
</style>
</head>

<body>

<section class="hero">

<div class="layer bg1"></div>
<div class="layer bg2"></div>
<div class="layer bg3"></div>

<h1 class="headline">
<span>W</span><span>E</span><span>L</span><span>C</span>
<span>O</span><span>M</span><span>E</span>
</h1>

<div class="stats">
<div class="stat"><h2 data-target="95">0</h2><p>Efficiency</p></div>
<div class="stat"><h2 data-target="80">0</h2><p>Performance</p></div>
<div class="stat"><h2 data-target="99">0</h2><p>Reliability</p></div>
</div>

<div class="car-wrapper">

<!-- SVG CAR -->
<svg class="car-svg" viewBox="0 0 300 120">
  <rect x="20" y="40" width="260" height="40" rx="10" fill="#0072ff"/>
  
  <!-- Wheels -->
  <circle class="wheel" cx="80" cy="90" r="15" fill="black"/>
  <circle class="wheel" cx="220" cy="90" r="15" fill="black"/>
</svg>

</div>

<div class="road"></div>

</section>

<section class="spacer"></section>

<script>
gsap.registerPlugin(ScrollTrigger);

// HEADLINE
gsap.to(".headline span",{
  opacity:1,
  y:0,
  filter:"blur(0px)",
  duration:1,
  stagger:0.07,
  ease:"power4.out"
});

// STATS
gsap.to(".stat",{
  opacity:1,
  y:0,
  stagger:0.2,
  duration:1,
  scrollTrigger:{
    trigger:".stats",
    start:"top 80%"
  }
});

// COUNTER
document.querySelectorAll(".stat h2").forEach(el=>{
  let val=+el.dataset.target;
  gsap.to(el,{
    innerText:val,
    duration:2,
    snap:{innerText:1},
    scrollTrigger:{
      trigger:el,
      start:"top 85%"
    }
  });
});

// MASTER TIMELINE
let tl = gsap.timeline({
  scrollTrigger:{
    trigger:".hero",
    start:"top top",
    end:"bottom top",
    scrub:1
  }
});

// PARALLAX
tl.to(".bg2",{y:100},0);
tl.to(".bg3",{y:200},0);

// CAR MOTION
tl.to(".car-svg",{
  x:window.innerWidth + 300,
  scale:1,
  rotation:5,
  ease:"none"
},0);

// WHEEL ROTATION (🔥 GOD DETAIL)
tl.to(".wheel",{
  rotation:720,
  transformOrigin:"center",
  ease:"none"
},0);

// ROAD
tl.to(".road",{
  backgroundPositionX:"300px",
  ease:"none"
},0);

// TEXT OUT
tl.to(".headline",{opacity:0,y:-100},0.3);
tl.to(".stats",{opacity:0,y:-50},0.4);

</script>

</body>
</html>
